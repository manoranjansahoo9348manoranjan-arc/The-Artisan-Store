<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal | The Artisan Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root { --brand-gold: #b89c6d; --luxury-dark: #1a1a1a; }
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .portal-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-update { background-color: var(--luxury-dark); color: white; border-radius: 50px; padding: 12px 25px; transition: 0.3s; }
        .btn-update:hover { background-color: var(--brand-gold); color: white; }
        .status-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 50px; }
    </style>
</head>
<body class="py-5">

    <div class="container">
        <div class="max-w-2xl mx-auto">
            <div class="text-center mb-5">
                <h1 class="fw-bold"><i class="bi bi-shield-lock text-warning"></i> Staff Management</h1>
                <p class="text-muted">Marriage Luxury Edition Operations</p>
            </div>

            <div class="card portal-card p-4 p-md-5 bg-white">
                <h4 class="mb-4 fw-bold">Update Decoration Status</h4>
                <div class="input-group mb-4">
                    <span class="input-group-text bg-white border-end-0 rounded-start-pill ps-3"><i class="bi bi-search"></i></span>
                    <input type="text" id="orderSearch" class="form-control border-start-0 rounded-end-pill p-3" placeholder="Enter Order ID (e.g. ORD123456)">
                </div>
                
                <div id="orderDetails" class="mb-4" style="display: none;">
                    <div class="p-3 border rounded-4 bg-light">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="fw-bold" id="resTitle"></span>
                            <span class="badge bg-warning text-dark status-badge" id="resStatus"></span>
                        </div>
                        <p class="small text-muted mb-1"><i class="bi bi-person"></i> Client: <span id="resName"></span></p>
                        <p class="small text-muted mb-0"><i class="bi bi-calendar-event"></i> Date: <span id="resDate"></span></p>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button class="btn btn-update fw-bold" onclick="searchOrder()">Find Order</button>
                    <button id="markCompleteBtn" class="btn btn-success rounded-pill py-3 fw-bold mt-2" onclick="completeDecor()" style="display: none;">
                        Mark Decoration as Completed
                    </button>
                    <a href="index.html" class="btn btn-link text-decoration-none text-dark mt-3">
                        <i class="bi bi-arrow-left"></i> Back to Main Store
                    </a>
                </div>
                
                <div id="alertBox" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        let currentOrderIndex = -1;

        function searchOrder() {
            const id = document.getElementById('orderSearch').value.trim().toUpperCase();
            let orders = JSON.parse(localStorage.getItem('my_orders')) || [];
            
            currentOrderIndex = orders.findIndex(o => o.orderId === id);
            const detailsDiv = document.getElementById('orderDetails');
            const markBtn = document.getElementById('markCompleteBtn');
            const alertBox = document.getElementById('alertBox');

            if (currentOrderIndex !== -1) {
                const order = orders[currentOrderIndex];
                document.getElementById('resTitle').innerText = order.title;
                document.getElementById('resStatus').innerText = order.status;
                document.getElementById('resName').innerText = order.user.name;
                document.getElementById('resDate').innerText = order.user.date;
                
                detailsDiv.style.display = 'block';
                alertBox.innerHTML = '';
                
                if (order.status.includes('40%')) {
                    markBtn.style.display = 'block';
                } else {
                    markBtn.style.display = 'none';
                    alertBox.innerHTML = `<div class="alert alert-info rounded-4 small">Decoration for this order is already marked as finished or the order is fully completed.</div>`;
                }
            } else {
                detailsDiv.style.display = 'none';
                markBtn.style.display = 'none';
                alertBox.innerHTML = `<div class="alert alert-danger rounded-4 small">Order ID not found. Please verify the ID.</div>`;
            }
        }

        function completeDecor() {
            if (currentOrderIndex === -1) return;

            let orders = JSON.parse(localStorage.getItem('my_orders')) || [];
            const orderId = orders[currentOrderIndex].orderId;

            // Update status
            orders[currentOrderIndex].status = 'Decor Completed - Pending 60% Balance';
            
            localStorage.setItem('my_orders', JSON.stringify(orders));
            
            document.getElementById('markCompleteBtn').style.display = 'none';
            document.getElementById('resStatus').innerText = orders[currentOrderIndex].status;
            document.getElementById('alertBox').innerHTML = `
                <div class="alert alert-success rounded-4">
                    <i class="bi bi-check-circle-fill"></i> Success! Decoration for <strong>${orderId}</strong> is marked complete. 
                    The customer can now pay the remaining 60% balance from their "My Bookings" page.
                </div>`;
        }
    </script>
</body>
</html>
